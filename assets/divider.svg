<svg width="1200" height="6" viewBox="0 0 1200 6" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" gradientUnits="userSpaceOnUse" x1="-300" y1="0" x2="300" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-300 0;1500 0;-300 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect x="0" y="2.5" width="1200" height="1" fill="#8B5CF6" opacity="0.15"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#lineGrad)"/>
</svg>
