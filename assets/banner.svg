<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070D">
        <animate attributeName="stop-color" values="#05070D;#0B1220;#05070D" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%" stop-color="#0B1220">
        <animate attributeName="stop-color" values="#0B1220;#120B2E;#0B1220" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#120B2E">
        <animate attributeName="stop-color" values="#120B2E;#0B1220;#120B2E" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="blurGlass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <clipPath id="cardClip">
      <rect x="56" y="54" width="620" height="232" rx="20"/>
    </clipPath>

    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.45"/>
    </linearGradient>

    <linearGradient id="nodeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="340" rx="24" fill="url(#bgGrad)"/>

  <!-- ambient glow orbs -->
  <circle cx="980" cy="70" r="170" fill="url(#glowPurple)" filter="url(#blurSoft)">
    <animate attributeName="cx" values="980;930;980" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="270" r="150" fill="url(#glowCyan)" filter="url(#blurSoft)">
    <animate attributeName="cy" values="270;220;270" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- neural / signal motif -->
  <g stroke="url(#nodeLine)" stroke-width="1" opacity="0.55">
    <line x1="720" y1="60" x2="800" y2="40"/>
    <line x1="800" y1="40" x2="860" y2="100"/>
    <line x1="860" y1="100" x2="780" y2="140"/>
    <line x1="780" y1="140" x2="720" y2="60"/>
    <line x1="860" y1="100" x2="960" y2="90"/>
    <line x1="960" y1="90" x2="1020" y2="150"/>
    <line x1="1020" y1="150" x2="1080" y2="60"/>
    <line x1="900" y1="180" x2="960" y2="90"/>
    <line x1="900" y1="180" x2="1000" y2="230"/>
    <line x1="1000" y1="230" x2="1100" y2="260"/>
    <line x1="1000" y1="230" x2="850" y2="260"/>
    <line x1="850" y1="260" x2="940" y2="300"/>
    <line x1="780" y1="140" x2="760" y2="220"/>
    <line x1="760" y1="220" x2="850" y2="260"/>
    <line x1="1020" y1="150" x2="1150" y2="180"/>
    <line x1="1100" y1="260" x2="1150" y2="180"/>
  </g>

  <g fill="#C4B5FD">
    <circle cx="720" cy="60" r="3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="40" r="3"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="100" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="140" r="3"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="180" r="3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="90" r="3.5"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="150" r="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="60" r="3"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="230" r="3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="260" r="3"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="260" r="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="6.2s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="300" r="3"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="220" r="3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5.8s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="180" r="3"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- traveling signal -->
  <circle r="3.5" fill="#67E8F9">
    <animateMotion dur="6s" repeatCount="indefinite"
      path="M720,60 L800,40 L860,100 L960,90 L1020,150 L1080,60"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- glass card -->
  <g clip-path="url(#cardClip)">
    <rect x="56" y="54" width="620" height="232" fill="url(#bgGrad)" filter="url(#blurGlass)" opacity="0.7"/>
    <rect x="56" y="54" width="620" height="232" fill="#FFFFFF" opacity="0.035"/>
  </g>
  <rect x="56" y="54" width="620" height="232" rx="20" fill="none" stroke="url(#cardBorder)" stroke-width="1.4"/>
  <line x1="68" y1="56" x2="666" y2="56" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1"/>

  <!-- status pill -->
  <g transform="translate(548,80)">
    <circle cx="0" cy="0" r="4" fill="#34D399">
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="12" y="4" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" letter-spacing="1" fill="#94A3B8">OPEN TO WORK</text>
  </g>

  <!-- eyebrow -->
  <text x="96" y="100" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13" letter-spacing="3" fill="#22D3EE" opacity="0.9">// AI_ENGINEER.SYSTEM</text>

  <!-- name -->
  <text x="94" y="155" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="700" fill="#F1F5F9" letter-spacing="0.5">Kanishk Gupta</text>

  <!-- rotating role -->
  <g font-family="'JetBrains Mono','Fira Code',monospace" font-size="19" fill="#A78BFA">
    <text x="96" y="195">
      AI Engineer
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.033;0.30;0.333;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="96" y="195">
      Full Stack Developer
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.333;0.367;0.633;0.667;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="96" y="195">
      Building Intelligent Systems
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.667;0.70;0.967;1" dur="9s" repeatCount="indefinite"/>
    </text>
  </g>
  <text x="358" y="195" font-family="'JetBrains Mono',monospace" font-size="19" fill="#22D3EE">
    &#9615;
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite"/>
  </text>

  <!-- tagline -->
  <text x="96" y="230" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#94A3B8">Turning research papers into production-grade AI systems.</text>

  <!-- footer meta -->
  <line x1="96" y1="252" x2="666" y2="252" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
  <text x="96" y="272" font-family="'Segoe UI',Arial,sans-serif" font-size="12.5" fill="#64748B">B.Tech Computer Science &#183; BML Munjal University</text>
</svg>
