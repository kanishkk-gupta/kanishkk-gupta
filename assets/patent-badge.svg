<svg width="320" height="380" viewBox="0 0 320 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="badgeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sealBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D0FE"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="ribbonGradA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="ribbonGradB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>
    <filter id="blurSoft2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <path id="arcTop" d="M 65 150 A 95 95 0 0 1 255 150"/>
  </defs>

  <!-- ribbon tails -->
  <polygon points="135,230 160,230 170,375 147,355 124,375" fill="url(#ribbonGradA)"/>
  <polygon points="160,230 185,230 196,375 173,355 150,375" fill="url(#ribbonGradB)"/>

  <!-- glow -->
  <circle cx="160" cy="150" r="120" fill="url(#badgeGlow)" filter="url(#blurSoft2)"/>

  <!-- rotating tick ring -->
  <circle cx="160" cy="150" r="104" fill="none" stroke="url(#sealBorder)" stroke-width="2.5" stroke-dasharray="3 8" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="0 160 150" to="360 160 150" dur="40s" repeatCount="indefinite"/>
  </circle>

  <!-- seal body -->
  <circle cx="160" cy="150" r="88" fill="#0B1220" stroke="url(#sealBorder)" stroke-width="2"/>
  <circle cx="160" cy="150" r="78" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>

  <!-- arched label -->
  <text font-family="'JetBrains Mono','Fira Code',monospace" font-size="13" letter-spacing="3" fill="#22D3EE">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">LEAD INVENTOR</textPath>
  </text>

  <!-- star emblem -->
  <g transform="translate(160,130)">
    <polygon points="0,-30 8,-9 30,-9 12,4 19,26 0,13 -19,26 -12,4 -30,-9 -8,-9"
      fill="url(#starGrad)">
      <animateTransform attributeName="transform" type="rotate" values="0;8;0;-8;0" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <text x="160" y="185" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#F1F5F9">PATENT</text>
  <text x="160" y="203" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" letter-spacing="3" fill="#94A3B8">PUBLISHED &#183; INDIA</text>
</svg>
